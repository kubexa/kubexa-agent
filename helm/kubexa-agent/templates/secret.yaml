{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubexa-agent.secretName" . }}
  labels:
    {{- include "kubexa-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  tenant-token: {{ required "secret.tenantToken is required when secret.create=true and secret.existingSecret is empty" .Values.secret.tenantToken | quote }}
{{- end }}
