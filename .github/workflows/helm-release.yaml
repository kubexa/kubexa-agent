name: Helm Release

on:
  push:
    branches: ["main"]
    paths:
      - "helm/**"
      - ".github/workflows/helm-release.yaml"

  # manuel tetikleme
  workflow_dispatch:

jobs:
  release:
    name: Package & Publish Helm Chart
    runs-on: ubuntu-latest

    permissions:
      contents: write  # helm-charts repo'ya push için

    steps:
      - name: Checkout kubexa-agent
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Lint chart
        run: helm lint helm/kubexa-agent

      - name: Package chart
        run: |
          mkdir -p dist
          helm package helm/kubexa-agent \
            --destination dist \
            --version $(grep '^version:' helm/kubexa-agent/Chart.yaml | awk '{print $2}')

      - name: Checkout helm-charts repo
        uses: actions/checkout@v4
        with:
          repository: kubexa/helm-charts   # ← ayrı repo
          token: ${{ secrets.HELM_CHARTS_TOKEN }}
          path: helm-charts-repo

      - name: Copy chart package
        run: cp dist/*.tgz helm-charts-repo/

      - name: Update helm repo index
        run: |
          cd helm-charts-repo
          helm repo index . --url https://kubexa.github.io/helm-charts

      - name: Push to helm-charts repo
        run: |
          cd helm-charts-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: release kubexa-agent chart"
          git push