syntax = "proto3";
package agent.v1;

import "proto/agent/v1/log.proto";
import "proto/agent/v1/state.proto";
import "proto/agent/v1/metric.proto";
import "proto/common/v1/metadata.proto";

option go_package = "github.com/kubexa/kubexa-agent/proto/gen/go/agent/v1;agentv1";

// Wire-format compatibility policy:
//   - Field numbers and oneof discriminators are stable; never reuse or retype.
//   - Removed fields must use `reserved`; new capabilities use new field numbers.
//   - Superseded payloads stay on the wire with [deprecated = true].
//   - API versioning is negotiated at handshake via proto_version fields (see pkg/protoversion).

service AgentService {
  // Bidirectional stream:
  // Agent → Gateway: log/state/metric verisi
  // Gateway → Agent: config update, ack, backpressure, shutdown
  rpc Connect(stream AgentMessage) returns (stream GatewayMessage);
}

// ─── Agent → Gateway ────────────────────────────────────────────────────────

message AgentMessage {
  string                  message_id = 1; // idempotency key (uuid)
  common.v1.AgentMetadata meta       = 2;

  oneof payload {
    HandshakeRequest       handshake          = 3;
    LogBatch               logs               = 4;
    StateEvent             state              = 5;
    MetricBatch            metrics            = 6 [deprecated = true]; // use kube_metrics / prometheus_metrics
    Heartbeat              heartbeat          = 7;
    MetricsEvent           kube_metrics       = 8;
    PrometheusMetricsEvent prometheus_metrics = 9;
  }
}

message HandshakeRequest {
  string            agent_version            = 1; // semver "1.2.3"
  string            proto_version            = 2; // preferred API version, e.g. "v1"
  string            cluster_id               = 3;
  string            tenant_token             = 4; // auth token
  AgentCapabilities caps                     = 5;
  repeated string   supported_proto_versions = 6; // versions this agent can speak (newest first)
}

message AgentCapabilities {
  bool logs    = 1;
  bool state   = 2;
  bool metrics = 3;
}

message Heartbeat {
  int64       timestamp_unix_ms = 1;
  AgentHealth health            = 2;
}

message AgentHealth {
  int64  queue_depth      = 1;
  int64  dropped_messages = 2;
  string status           = 3; // "healthy" | "degraded" | "overloaded"
}

// ─── Gateway → Agent ────────────────────────────────────────────────────────

message GatewayMessage {
  string message_id = 1;

  oneof payload {
    HandshakeResponse  handshake    = 2;
    Ack                ack          = 3;
    ConfigUpdate       config       = 4;
    BackpressureSignal backpressure = 5;
    Shutdown           shutdown     = 6;
  }
}

message HandshakeResponse {
  bool           accepted                 = 1;
  string         session_id               = 2;
  string         server_version           = 3;
  string         rejection_reason         = 4; // accepted=false ise dolu
  ConfigSnapshot config                   = 5; // initial config
  string         proto_version            = 6; // negotiated API version, e.g. "v1"
  repeated string supported_proto_versions = 7; // gateway-supported versions (newest first)
}

message Ack {
  repeated string message_ids = 1; // batch ack
}

message BackpressureSignal {
  bool  throttle = 1;
  int32 delay_ms = 2;
}

message Shutdown {
  string reason = 1;
}

// ─── Config ─────────────────────────────────────────────────────────────────

message ConfigUpdate {
  string         config_version = 1;
  ConfigSnapshot config         = 2;
}

message ConfigSnapshot {
  repeated LogCollectorConfig  log_collectors   = 1;
  repeated WatcherConfig       watchers         = 2;
  repeated MetricScrapeConfig  metric_scrapers  = 3;
  int32                        heartbeat_interval_sec = 4;
  int32                        batch_size             = 5;
  int32                        flush_interval_ms      = 6;
}

message LogCollectorConfig {
  string            id            = 1;
  string            namespace     = 2;
  repeated string   pod_selectors = 3; // label selectors
  repeated string   containers    = 4; // boş ise tümü
  bool              follow        = 5;
  int32             tail_lines    = 6;
}

message WatcherConfig {
  string                 id        = 1;
  string                 namespace = 2; // boş ise tüm namespace
  repeated ResourceKind  kinds     = 3;
  int32                  resync_sec = 4;
}

message MetricScrapeConfig {
  string id              = 1;
  string endpoint        = 2; // scrape URL
  int32  interval_sec    = 3;
  map<string, string> extra_labels = 4;
}
