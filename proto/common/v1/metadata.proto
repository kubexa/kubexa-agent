syntax = "proto3";
package common.v1;

option go_package = "github.com/kubexa/kubexa-agent/proto/gen/go/common/v1;commonv1";

// AgentMetadata her mesajda taşınan kimlik bilgisi
message AgentMetadata {
  string tenant_id   = 1;
  string cluster_id  = 2;
  string agent_id    = 3;
  string session_id  = 4;
  int64  timestamp   = 5; // unix milliseconds
}
